spring:
  application:
    name: emr-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:emr_db}
    username: ${DB_USER:emr_user}
    password: ${DB_PASSWORD:emr_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET:changeme-in-production-minimum-32-characters!}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  super-admin:
    email: ${SUPER_ADMIN_EMAIL:superadmin@emr.internal}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

logging:
  level:
    com.emr: INFO
    org.springframework.security: WARN
